<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptHub Nexus | Global AI Creator Network</title>
    <!-- Frameworks & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #F8FAFC; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .nexus-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(226, 232, 240, 0.5); }
        .btn-nexus-main { background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.2); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-nexus-main:active { transform: scale(0.95); }
        .nexus-card { background: #ffffff; border: 1px solid rgba(241, 245, 249, 1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); transition: all 0.4s ease; }
        .nexus-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .loader-spinner { border-top-color: #3B82F6; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .mobile-bottom-bar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid rgba(226, 232, 240, 0.8); }
        .profile-banner { background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%); }
    </style>
</head>
<body>
    <div id="root">
        <div class="min-h-screen flex flex-col items-center justify-center bg-white text-center p-10">
            <div class="loader-spinner ease-linear rounded-full border-4 border-t-4 border-gray-100 h-12 w-12 mb-6"></div>
            <h1 class="text-xl font-extrabold text-slate-900 tracking-tighter uppercase">Initializing Nexus Protocol</h1>
            <p class="text-slate-400 mt-2 text-sm font-medium tracking-wide uppercase">Establishing Global Uplink...</p>
        </div>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            signOut, signInAnonymously, updateProfile, GoogleAuthProvider, signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc, getDoc, updateDoc, increment, deleteDoc, arrayUnion, arrayRemove 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBNdUnvdffGt9bJgwZsJXcPulomN4M1Lbs",
            authDomain: "prompthub-e69f8.firebaseapp.com",
            projectId: "prompthub-e69f8",
            storageBucket: "prompthub-e69f8.firebasestorage.app",
            messagingSenderId: "876000777567",
            appId: "1:876000777567:web:1927dd9d1bd037678792ea"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'prompthub-e69f8'; 
        const googleProvider = new GoogleAuthProvider();

        window.fb = { 
            auth, db, appId, collection, addDoc, query, onSnapshot, 
            serverTimestamp, doc, setDoc, getDoc, updateDoc, increment, deleteDoc, arrayUnion, arrayRemove,
            signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            signOut, onAuthStateChanged, signInAnonymously, updateProfile, 
            googleProvider, signInWithPopup
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [user, setUser] = useState(null);
            const [profileData, setProfileData] = useState({ bio: '', name: '', photoURL: '', followersCount: 0, followingCount: 0 });
            const [view, setView] = useState('home'); 
            const [posts, setPosts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [authModal, setAuthModal] = useState({ open: false, mode: 'login', email: '', password: '', name: '', error: '' });
            const [postModal, setPostModal] = useState({ open: false, prompt: '', imageUrl: '', model: 'Midjourney v6.1 Pro' });
            const [editProfileModal, setEditProfileModal] = useState({ open: false, name: '', bio: '', photoURL: '' });
            const [copiedId, setCopiedId] = useState(null);
            
            // Interaction States
            const [selectedUser, setSelectedUser] = useState(null);
            const [isFollowing, setIsFollowing] = useState(false);
            const [commentModal, setCommentModal] = useState({ open: false, post: null, text: '' });

            // --- ALUTH: Search States ---
            const [searchQuery, setSearchQuery] = useState('');

            // --- ALUTH: Derive active creators logically from posts ---
            const activeCreators = React.useMemo(() => {
                const map = new Map();
                posts.forEach(p => {
                    if (!map.has(p.userId)) {
                        map.set(p.userId, { id: p.userId, name: p.userName, photoURL: p.userPhoto || `https://api.dicebear.com/7.x/avataaars/svg?seed=${p.userId}` });
                    }
                });
                return Array.from(map.values());
            }, [posts]);

            const filteredCreators = searchQuery.trim() === '' ? [] : activeCreators.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
            // -----------------------------

            useEffect(() => {
                const handleReady = () => setIsReady(true);
                if (window.fb) handleReady();
                else window.addEventListener('firebase-ready', handleReady);
                return () => window.removeEventListener('firebase-ready', handleReady);
            }, []);

            useEffect(() => {
                if (!isReady) return;
                const { auth, onAuthStateChanged, signInAnonymously } = window.fb;
                const unsubscribeAuth = onAuthStateChanged(auth, async (u) => {
                    if (!u) {
                        try { await signInAnonymously(auth); } catch (e) { console.warn("Guest access active"); }
                    }
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribeAuth();
            }, [isReady]);

            useEffect(() => {
                if (!isReady || !user || user.isAnonymous) return;
                const { db, appId, doc, onSnapshot } = window.fb;
                const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info');
                const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', user.uid);
                
                const unsubscribeProfile = onSnapshot(profileRef, (snap) => {
                    if (snap.exists()) setProfileData(prev => ({ ...prev, ...snap.data() }));
                });
                const unsubscribeStats = onSnapshot(statsRef, (snap) => {
                    if (snap.exists()) setProfileData(prev => ({ ...prev, ...snap.data() }));
                });
                return () => { unsubscribeProfile(); unsubscribeStats(); };
            }, [isReady, user]);

            useEffect(() => {
                if (!isReady || !user) return; 
                const { db, appId, collection, onSnapshot } = window.fb;
                const postsCol = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                const unsubscribePosts = onSnapshot(postsCol, (snap) => {
                    const fetched = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const sorted = fetched.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    setPosts(sorted);
                }, (err) => console.error("Feed Error:", err));
                return () => unsubscribePosts();
            }, [isReady, user]);

            // Keep comment modal up to date with new comments
            useEffect(() => {
                if (commentModal.open && commentModal.post) {
                    const updatedPost = posts.find(p => p.id === commentModal.post.id);
                    if (updatedPost) setCommentModal(prev => ({ ...prev, post: updatedPost }));
                }
            }, [posts]);

            useEffect(() => {
                if (!selectedUser || !user || user.isAnonymous) return;
                const { db, appId, doc, onSnapshot } = window.fb;
                const followRef = doc(db, 'artifacts', appId, 'public', 'data', 'follows', `${user.uid}_${selectedUser.id}`);
                const unsubscribe = onSnapshot(followRef, (snap) => {
                    setIsFollowing(snap.exists());
                });
                return () => unsubscribe();
            }, [selectedUser, user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, user, posts, authModal.open, postModal.open, editProfileModal.open, selectedUser, isFollowing, commentModal.open]);

            const handleGoogleSignIn = async () => {
                setLoading(true);
                const { auth, db, appId, googleProvider, signInWithPopup, doc, setDoc, getDoc, serverTimestamp } = window.fb;
                try {
                    const result = await signInWithPopup(auth, googleProvider);
                    const loggedInUser = result.user;
                    const profileRef = doc(db, 'artifacts', appId, 'users', loggedInUser.uid, 'profile', 'info');
                    const profileSnap = await getDoc(profileRef);
                    if (!profileSnap.exists()) {
                        await setDoc(profileRef, {
                            name: loggedInUser.displayName,
                            email: loggedInUser.email,
                            photoURL: loggedInUser.photoURL,
                            bio: 'Elite AI Creator exploring the Nexus.',
                            createdAt: serverTimestamp(),
                            provider: 'google'
                        });
                    }
                    setAuthModal({ ...authModal, open: false, error: '' });
                } catch (err) {
                    setAuthModal(prev => ({ ...prev, error: "Authentication failed." }));
                }
                setLoading(false);
            };

            const toggleFollow = async () => {
                if (!user || user.isAnonymous) return setAuthModal({...authModal, open: true, mode: 'login'});
                if (!selectedUser) return;

                const { db, appId, doc, setDoc, deleteDoc, increment, serverTimestamp } = window.fb;
                const followId = `${user.uid}_${selectedUser.id}`;
                const followRef = doc(db, 'artifacts', appId, 'public', 'data', 'follows', followId);
                const myStatsRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', user.uid);
                const targetStatsRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', selectedUser.id);

                try {
                    if (isFollowing) {
                        await deleteDoc(followRef);
                        await setDoc(myStatsRef, { followingCount: increment(-1) }, { merge: true });
                        await setDoc(targetStatsRef, { followersCount: increment(-1) }, { merge: true });
                        setSelectedUser(prev => ({ ...prev, followersCount: Math.max(0, (prev.followersCount || 0) - 1) }));
                    } else {
                        await setDoc(followRef, { followerId: user.uid, followingId: selectedUser.id, timestamp: serverTimestamp() }, { merge: true });
                        await setDoc(myStatsRef, { followingCount: increment(1) }, { merge: true });
                        await setDoc(targetStatsRef, { followersCount: increment(1) }, { merge: true });
                        setSelectedUser(prev => ({ ...prev, followersCount: (prev.followersCount || 0) + 1 }));
                    }
                } catch (e) { console.error("Follow error:", e); }
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { auth, db, appId, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, setDoc, doc, serverTimestamp } = window.fb;
                try {
                    if (authModal.mode === 'signup') {
                        const res = await createUserWithEmailAndPassword(auth, authModal.email, authModal.password);
                        await updateProfile(res.user, { displayName: authModal.name });
                        await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'info'), {
                            name: authModal.name, 
                            email: authModal.email, 
                            photoURL: `https://api.dicebear.com/7.x/avataaars/svg?seed=${res.user.uid}`,
                            bio: 'Newly authorized intelligence in the Nexus.',
                            createdAt: serverTimestamp()
                        });
                    } else {
                        await signInWithEmailAndPassword(auth, authModal.email, authModal.password);
                    }
                    setAuthModal({ ...authModal, open: false, error: '' });
                } catch (err) {
                    setAuthModal({ ...authModal, error: "Access denied." });
                }
                setLoading(false);
            };

            const openPublicProfile = async (targetUserId) => {
                if (targetUserId === user?.uid) {
                    setView('profile');
                    setSelectedUser(null);
                    return;
                }
                const { db, appId, doc, getDoc } = window.fb;
                try {
                    const profileRef = doc(db, 'artifacts', appId, 'users', targetUserId, 'profile', 'info');
                    const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', targetUserId);
                    const profileSnap = await getDoc(profileRef);
                    const statsSnap = await getDoc(statsRef);
                    
                    if (profileSnap.exists()) {
                        const statsData = statsSnap.exists() ? statsSnap.data() : { followersCount: 0, followingCount: 0 };
                        setSelectedUser({ id: targetUserId, ...profileSnap.data(), ...statsData });
                        setView('public_profile');
                    }
                } catch (e) { console.error("Profile load error:", e); }
            };

            const saveProfileUpdates = async (e) => {
                e.preventDefault();
                const { db, appId, doc, updateDoc, auth, updateProfile } = window.fb;
                try {
                    const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info');
                    await updateDoc(profileRef, { name: editProfileModal.name, bio: editProfileModal.bio, photoURL: editProfileModal.photoURL });
                    await updateProfile(auth.currentUser, { displayName: editProfileModal.name, photoURL: editProfileModal.photoURL });
                    setEditProfileModal({ ...editProfileModal, open: false });
                } catch (e) { console.error(e); }
            };

            const handleCreatePost = async (e) => {
                e.preventDefault();
                if (!user || user.isAnonymous) return setAuthModal({ ...authModal, open: true, mode: 'login', error: 'Sign in required' });
                setLoading(true);
                const { db, appId, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), {
                        userId: user.uid,
                        userName: profileData.name || user.displayName,
                        userPhoto: profileData.photoURL || user.photoURL,
                        prompt: postModal.prompt,
                        imageUrl: postModal.imageUrl,
                        model: postModal.model,
                        createdAt: serverTimestamp(),
                        likes: [], // Started tracking likes as an array
                        comments: []
                    });
                    setPostModal({ open: false, prompt: '', imageUrl: '', model: 'Midjourney v6.1 Pro' });
                    setView('home');
                } catch (err) { console.error(err); }
                setLoading(false);
            };

            // --- ALUTH: Search Dropdown UI Component ---
            const SearchResultsDropdown = () => (
                <div className="absolute top-full mt-3 w-full bg-white border border-slate-100 rounded-3xl shadow-2xl z-50 max-h-72 overflow-y-auto p-2">
                    {filteredCreators.length > 0 ? filteredCreators.map(creator => (
                        <div 
                            key={creator.id} 
                            className="flex items-center gap-4 p-3 hover:bg-slate-50 cursor-pointer rounded-2xl transition-all"
                            onClick={() => {
                                openPublicProfile(creator.id);
                                setSearchQuery(''); // Clear search after clicking
                            }}
                        >
                            <img src={creator.photoURL} className="w-10 h-10 rounded-[1rem] object-cover bg-slate-100 shadow-sm border border-slate-200" />
                            <span className="font-extrabold text-[13px] text-slate-800">{creator.name}</span>
                        </div>
                    )) : (
                        <div className="p-6 text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">No Creators Found</div>
                    )}
                </div>
            );
            // ------------------------------------------

            // FB-Style Like Toggle
            const toggleLike = async (post) => {
                if (!user || user.isAnonymous) return setAuthModal({...authModal, open: true, mode: 'login'});
                const { db, appId, doc, updateDoc, arrayUnion, arrayRemove } = window.fb;
                const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', post.id);

                const isLegacy = typeof post.likes === 'number';
                const hasLiked = !isLegacy && post.likes?.includes?.(user.uid);

                try {
                    if (isLegacy) {
                        await updateDoc(postRef, { likes: [user.uid] });
                    } else if (hasLiked) {
                        await updateDoc(postRef, { likes: arrayRemove(user.uid) });
                    } else {
                        await updateDoc(postRef, { likes: arrayUnion(user.uid) });
                    }
                } catch (e) { console.error(e); }
            };

            // FB-Style Comment Submission
            const submitComment = async (e) => {
                e.preventDefault();
                if (!user || user.isAnonymous) return setAuthModal({...authModal, open: true, mode: 'login'});
                if (!commentModal.text.trim()) return;

                const { db, appId, doc, updateDoc, arrayUnion } = window.fb;
                const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', commentModal.post.id);

                const newComment = {
                    id: Date.now().toString(),
                    userId: user.uid,
                    userName: profileData.name || user.displayName || 'Nexus User',
                    userPhoto: profileData.photoURL || user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`,
                    text: commentModal.text,
                    timestamp: new Date().toISOString()
                };

                try {
                    await updateDoc(postRef, { comments: arrayUnion(newComment) });
                    setCommentModal({ ...commentModal, text: '' });
                } catch (e) { console.error("Comment Error:", e); }
            };

            // Native Share Logic
            const handleShare = async (post) => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'PromptHub Nexus',
                            text: `Check out this AI Prompt by ${post.userName}: "${post.prompt}"`,
                            url: window.location.href,
                        });
                    } catch (err) { console.log('Share dismissed'); }
                } else {
                    const ta = document.createElement("textarea");
                    ta.value = `Prompt by ${post.userName}: ${post.prompt}`;
                    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
                    alert("Prompt copied to clipboard!");
                }
            };

            const userPosts = posts.filter(p => p.userId === user?.uid);
            const targetUserPosts = selectedUser ? posts.filter(p => p.userId === selectedUser.id) : [];

            if (loading && !isReady) return null;

            return (
                <div className="min-h-screen pb-24 md:pb-0">
                    <nav className="sticky top-0 z-50 nexus-nav px-6 py-4">
                        <div className="max-w-5xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => { setView('home'); setSelectedUser(null); }}>
                                <div className="w-10 h-10 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-lg active:scale-90 transition-transform">
                                    <i data-lucide="zap" className="w-6" fill="currentColor"></i>
                                </div>
                                <h1 className="text-2xl font-black tracking-tighter text-slate-900 uppercase">PROMPTHUB<span className="text-blue-600 ml-1">NEXUS</span></h1>
                            </div>
                            
                            {/* --- ALUTH: Desktop Search Bar --- */}
                            <div className="hidden md:block flex-1 max-w-md mx-8 relative">
                                <div className="relative group">
                                    <i data-lucide="search" className="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-blue-600 transition-colors"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Search Global Creators..." 
                                        className="w-full bg-slate-50/80 border border-slate-200 rounded-[2rem] py-3 pl-12 pr-6 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white font-bold text-xs tracking-wide transition-all shadow-sm"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                                {searchQuery && <SearchResultsDropdown />}
                            </div>
                            {/* ---------------------------------- */}

                            <div className="flex items-center gap-6">
                                {/* --- ALUTH: Desktop Navigation Icons --- */}
                                <div className="hidden md:flex items-center gap-6 mr-2 border-r border-slate-200 pr-6">
                                    <button onClick={() => { setView('home'); setSelectedUser(null); }} className={`transition-colors hover:scale-110 ${view === 'home' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-900'}`}>
                                        <i data-lucide="home" className="w-6 h-6"></i>
                                    </button>
                                    <button onClick={() => { if(!user || user.isAnonymous) return setAuthModal({...authModal, open: true, mode: 'login'}); setView('notifications'); }} className={`transition-colors relative hover:scale-110 ${view === 'notifications' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-900'}`}>
                                        <i data-lucide="bell" className="w-6 h-6"></i>
                                        <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                                    </button>
                                </div>
                                {/* --------------------------------------- */}

                                {!user || user.isAnonymous ? (
                                    <button onClick={() => setAuthModal({ ...authModal, open: true, mode: 'login', error: '' })} className="bg-blue-600 text-white px-7 py-3 rounded-2xl font-bold text-xs shadow-lg active:scale-95 transition-all uppercase tracking-widest">SIGN IN</button>
                                ) : (
                                    <button onClick={() => { setView('profile'); setSelectedUser(null); }} className="w-12 h-12 rounded-2xl overflow-hidden border-2 border-blue-500 shadow-sm active:scale-90 transition-transform bg-white p-0.5">
                                        <img src={profileData.photoURL || user.photoURL} className="rounded-xl object-cover w-full h-full" />
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-xl mx-auto px-4 py-10">
                        {view === 'home' ? (
                            <div className="space-y-12 animate-in fade-in duration-700">
                                <div className="text-center px-4 mb-14">
                                    <h2 className="text-5xl font-black text-slate-900 tracking-tighter leading-none mb-4 uppercase italic">Nexus Global</h2>
                                    <p className="text-slate-400 font-medium text-[11px] tracking-[0.3em] opacity-80 uppercase leading-relaxed text-center mb-10">World-Class AI Intel Community</p>
                                    
                                    {/* --- ALUTH: Mobile Search Bar --- */}
                                    <div className="md:hidden relative w-full text-left">
                                        <div className="relative group shadow-sm">
                                            <i data-lucide="search" className="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-blue-600 transition-colors"></i>
                                            <input 
                                                id="mobile-search-input"
                                                type="text" 
                                                placeholder="Search Creators..." 
                                                className="w-full bg-white border border-slate-200 rounded-[2.5rem] py-5 pl-14 pr-6 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 font-bold text-sm tracking-wide transition-all shadow-md"
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                            />
                                        </div>
                                        {searchQuery && <SearchResultsDropdown />}
                                    </div>
                                    {/* --------------------------------- */}
                                </div>
                                {posts.length === 0 ? (
                                    <div className="text-center py-32 bg-white rounded-[4rem] border border-dashed border-slate-200">
                                        <i data-lucide="globe" className="text-slate-200 w-16 h-16 mx-auto mb-6 animate-pulse"></i>
                                        <p className="text-slate-400 font-black text-[10px] uppercase tracking-[0.4em]">Syncing Global Data Stream...</p>
                                    </div>
                                ) : (
                                    posts.map(post => (
                                        <div key={post.id} className="bg-white rounded-[3.5rem] border border-slate-100 overflow-hidden nexus-card transition-all mb-14 p-2">
                                            <div className="p-6 flex items-center justify-between">
                                                <div className="flex items-center gap-4 cursor-pointer group" onClick={() => openPublicProfile(post.userId)}>
                                                    <div className="p-0.5 rounded-2xl bg-gradient-to-tr from-blue-500 to-indigo-600 shadow-sm group-hover:scale-105 transition-transform">
                                                        <img src={post.userPhoto} className="w-11 h-11 rounded-2xl bg-white p-0.5 object-cover" />
                                                    </div>

                                </div>
                                
                                <div className="flex-1 overflow-y-auto mb-6 space-y-6 px-4 no-scrollbar">
                                    {(!commentModal.post.comments || commentModal.post.comments.length === 0) ? (
                                        <div className="text-center py-20">
                                            <i data-lucide="message-square-dashed" className="w-12 h-12 text-slate-200 mx-auto mb-4"></i>
                                            <p className="text-slate-400 font-bold text-xs uppercase tracking-widest">Be the first to comment!</p>
                                        </div>
                                    ) : (
                                        commentModal.post.comments.map((c, i) => (
                                            <div key={i} className="flex gap-4">
                                                <img src={c.userPhoto} className="w-10 h-10 rounded-[1rem] bg-slate-100 object-cover flex-shrink-0" />
                                                <div className="bg-slate-50 p-5 rounded-[2rem] rounded-tl-none flex-1 border border-slate-100">
                                                    <p className="font-extrabold text-[13px] text-slate-900 mb-1">{c.userName}</p>
                                                    <p className="text-sm text-slate-600 font-medium leading-relaxed">{c.text}</p>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <form onSubmit={submitComment} className="flex gap-3 items-end px-2">
                                    <img src={profileData.photoURL || user?.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user?.uid}`} className="w-12 h-12 rounded-[1.2rem] object-cover border border-slate-100 flex-shrink-0" />
                                    <div className="flex-1 bg-slate-50 border border-slate-200 rounded-[2rem] flex items-center pr-2 focus-within:ring-4 focus-within:ring-blue-500/10 transition-all">
                                        <input 
                                            type="text" 
                                            placeholder="Write your thoughts..." 
                                            className="w-full bg-transparent py-4 px-6 outline-none text-sm font-medium"
                                            value={commentModal.text}
                                            onChange={(e) => setCommentModal({...commentModal, text: e.target.value})}
                                        />
                                        <button type="submit" disabled={!commentModal.text.trim()} className="bg-blue-600 text-white p-3 rounded-[1.5rem] disabled:opacity-50 hover:bg-blue-700 transition-colors shadow-sm">
                                            <i data-lucide="send" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
