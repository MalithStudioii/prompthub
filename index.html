                                <form onSubmit={handleAuth} className="space-y-5">
                                    {authModal.mode === 'signup' && <input type="text" placeholder="DISPLAY NAME" className="w-full bg-slate-50 border border-slate-100 rounded-[2rem] py-5 px-8 outline-none focus:ring-4 focus:ring-blue-500/10 font-bold text-sm tracking-widest transition-all" required value={authModal.name} onChange={e => setAuthModal({...authModal, name: e.target.value})} />}
                                    <input type="email" placeholder="EMAIL ADDRESS" className="w-full bg-slate-50 border border-slate-100 rounded-[2rem] py-5 px-8 outline-none focus:ring-4 focus:ring-blue-500/10 font-bold text-sm tracking-widest transition-all" required value={authModal.email} onChange={e => setAuthModal({...authModal, email: e.target.value})} />
                                    <input type="password" placeholder="SECURITY KEY" className="w-full bg-slate-50 border border-slate-100 rounded-[2rem] py-5 px-8 outline-none focus:ring-4 focus:ring-blue-500/10 font-bold text-sm tracking-widest transition-all" required value={authModal.password} onChange={e => setAuthModal({...authModal, password: e.target.value})} />
                                    <button className="w-full btn-nexus-main text-white py-6 rounded-[2.2rem] font-black text-sm tracking-[0.3em] shadow-xl active:scale-95 transition-all uppercase">Establish Link</button>
                                </form>
                                <button onClick={() => setAuthModal({...authModal, mode: authModal.mode==='login'?'signup':'login', error: ''})} className="w-full mt-10 text-[11px] font-black text-slate-400 hover:text-blue-600 transition-colors uppercase tracking-[0.3em]">{authModal.mode === 'login' ? "Request Access" : "Existing Member? Sign In"}</button>
                                <button onClick={() => setAuthModal({...authModal, open: false})} className="w-full mt-6 text-[10px] font-black text-slate-200 uppercase tracking-widest hover:text-slate-400 transition-colors">Abort Tunnel</button>
                            </div>
                        </div>
                    )}

                    {postModal.open && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-slate-900/50 backdrop-blur-2xl">
                            <div className="bg-white w-full max-w-lg rounded-[4.5rem] p-14 shadow-2xl animate-in slide-in-from-bottom-8 duration-500 overflow-y-auto max-h-[90vh]">
                                <h2 className="text-3xl font-black mb-12 text-slate-900 text-center tracking-tighter uppercase leading-none">Share Intelligence</h2>
                                <form onSubmit={handleCreatePost} className="space-y-10">
                                    <div className="space-y-3">
                                        <label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em] ml-3">Visual Output (Upload)</label>
                                        <div className="relative border-2 border-dashed border-slate-200 rounded-[2.2rem] p-6 text-center hover:bg-slate-50 transition-colors cursor-pointer group">
                                            <input type="file" accept="image/*" onChange={e => setPostModal({...postModal, imageFile: e.target.files[0]})} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                            {postModal.imageFile ? (
                                                <div className="text-blue-600 font-bold text-sm flex flex-col items-center gap-2"><i data-lucide="check-circle" className="w-8 h-8"></i><span className="text-[10px] uppercase tracking-widest">{postModal.imageFile.name}</span></div>
                                            ) : (
                                                <div className="text-slate-400 font-bold text-sm flex flex-col items-center gap-2 group-hover:text-blue-500 transition-colors"><i data-lucide="upload-cloud" className="w-8 h-8"></i><span className="text-[10px] uppercase tracking-widest">Tap to select image</span></div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="space-y-3"><label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em] ml-3">Creative Formula</label><textarea placeholder="Specify the secret magic behind this..." className="w-full bg-slate-50 border border-slate-100 rounded-[2.8rem] p-10 min-h-[180px] font-mono text-[15px] leading-relaxed outline-none focus:ring-4 focus:ring-blue-500/10 shadow-sm" required value={postModal.prompt} onChange={e => setPostModal({...postModal, prompt: e.target.value})}></textarea></div>
                                    <div className="space-y-3"><label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em] ml-3">Intelligence Model</label><select className="w-full bg-slate-50 border border-slate-100 rounded-[2.2rem] py-6 px-10 font-black text-xs outline-none cursor-pointer focus:ring-4 focus:ring-blue-500/10" value={postModal.model} onChange={e => setPostModal({...postModal, model: e.target.value})}><option>Midjourney v6.1 Pro</option><option>DALL-E 3 Nexus</option><option>Stable Diffusion XL Turbo</option><option>Flux.1 Dev Master</option><option>Google Veo 3 Elite</option></select></div>
                                    <button disabled={uploading} className="w-full btn-nexus-main text-white py-7 rounded-[3rem] font-black text-sm tracking-[0.3em] shadow-xl active:scale-95 transition-all disabled:opacity-50">{uploading ? 'TRANSMITTING...' : 'TRANSMIT TO NEXUS'}</button>
                                    <button type="button" onClick={() => setPostModal({ ...postModal, open: false, imageFile: null })} className="w-full text-xs font-black text-slate-300 uppercase tracking-widest text-center mt-4 hover:text-slate-500">Discard</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {commentModal.open && commentModal.post && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-slate-900/70 backdrop-blur-xl">
                            <div className="bg-white w-full max-w-lg rounded-[3.5rem] p-8 shadow-2xl animate-in slide-in-from-bottom-10 sm:zoom-in-95 duration-300 flex flex-col h-[75vh]">
                                <div className="flex justify-between items-center mb-6 px-4">
                                    <h3 className="text-xl font-black text-slate-900 uppercase tracking-widest">Comments</h3>
                                    <button onClick={() => setCommentModal({ open: false, post: null, text: '' })} className="bg-slate-50 p-3 rounded-full text-slate-400 hover:text-slate-900 transition-colors"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto mb-6 space-y-6 px-4 no-scrollbar">
                                    {(!commentModal.post.comments || commentModal.post.comments.length === 0) ? (
                                        <div className="text-center py-20"><i data-lucide="message-square-dashed" className="w-12 h-12 text-slate-200 mx-auto mb-4"></i><p className="text-slate-400 font-bold text-xs uppercase tracking-widest">Be the first to comment!</p></div>
                                    ) : (
                                        commentModal.post.comments.map((c, i) => (
                                            <div key={i} className="flex gap-4">
                                                <img src={c.userPhoto} className="w-10 h-10 rounded-[1rem] bg-slate-100 object-cover flex-shrink-0" />
                                                <div className="bg-slate-50 p-5 rounded-[2rem] rounded-tl-none flex-1 border border-slate-100"><p className="font-extrabold text-[13px] text-slate-900 mb-1">{c.userName}</p><p className="text-sm text-slate-600 font-medium leading-relaxed">{c.text}</p></div>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <form onSubmit={submitComment} className="flex gap-3 items-end px-2">
                                    <img src={profileData.photoURL || user?.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user?.uid}`} className="w-12 h-12 rounded-[1.2rem] object-cover border border-slate-100 flex-shrink-0" />
                                    <div className="flex-1 bg-slate-50 border border-slate-200 rounded-[2rem] flex items-center pr-2 focus-within:ring-4 focus-within:ring-blue-500/10 transition-all">
                                        <input type="text" placeholder="Write your thoughts..." className="w-full bg-transparent py-4 px-6 outline-none text-sm font-medium" value={commentModal.text} onChange={(e) => setCommentModal({...commentModal, text: e.target.value})} />
                                        <button type="submit" disabled={!commentModal.text.trim()} className="bg-blue-600 text-white p-3 rounded-[1.5rem] disabled:opacity-50 hover:bg-blue-700 transition-colors shadow-sm"><i data-lucide="send" className="w-4 h-4"></i></button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {shareModal.open && shareModal.post && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-slate-900/70 backdrop-blur-xl">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl animate-in slide-in-from-bottom-10 sm:zoom-in-95 duration-300">
                                <div className="flex justify-between items-center mb-8 px-2">
                                    <h3 className="text-xl font-black text-slate-900 uppercase tracking-widest">Share Intel</h3>
                                    <button onClick={() => setShareModal({ open: false, post: null })} className="bg-slate-50 p-2.5 rounded-full text-slate-400 hover:text-slate-900 transition-colors"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <div className="grid grid-cols-4 gap-4 mb-4">
                                    <a href={`https://wa.me/?text=${encodeURIComponent(`Check out this AI Prompt by ${shareModal.post.userName}: "${shareModal.post.prompt}" \n\nSee more on PromptHub Nexus!`)}`} target="_blank" className="flex flex-col items-center gap-3 group">
                                        <div className="w-14 h-14 bg-[#25D366]/10 text-[#25D366] rounded-2xl flex items-center justify-center group-hover:bg-[#25D366] group-hover:text-white transition-all shadow-sm"><i data-lucide="message-circle" className="w-6 h-6"></i></div>
                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">WhatsApp</span>
                                    </a>
                                    <a href={`https://twitter.com/intent/tweet?text=${encodeURIComponent(`Amazing AI prompt by ${shareModal.post.userName} on PromptHub Nexus! \n\n"${shareModal.post.prompt}"`)}`} target="_blank" className="flex flex-col items-center gap-3 group">
                                        <div className="w-14 h-14 bg-slate-100 text-slate-900 rounded-2xl flex items-center justify-center group-hover:bg-slate-900 group-hover:text-white transition-all shadow-sm"><i data-lucide="twitter" className="w-6 h-6"></i></div>
                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">X</span>
                                    </a>
                                    <a href={`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`} target="_blank" className="flex flex-col items-center gap-3 group">
                                        <div className="w-14 h-14 bg-[#1877F2]/10 text-[#1877F2] rounded-2xl flex items-center justify-center group-hover:bg-[#1877F2] group-hover:text-white transition-all shadow-sm"><i data-lucide="facebook" className="w-6 h-6"></i></div>
                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Facebook</span>
                                    </a>
                                    <button onClick={() => { const ta = document.createElement("textarea"); ta.value = `Prompt by ${shareModal.post.userName}: ${shareModal.post.prompt}`; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); setShareModal({ open: false, post: null }); alert("Prompt copied to clipboard!"); }} className="flex flex-col items-center gap-3 group">
                                        <div className="w-14 h-14 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center group-hover:bg-slate-200 transition-all shadow-sm"><i data-lucide="link" className="w-6 h-6"></i></div>
                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Copy</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
