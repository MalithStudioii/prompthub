<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptHub Nexus | Global AI Creator Network</title>
    <!-- Frameworks & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #F8FAFC; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .nexus-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(226, 232, 240, 0.5); }
        .btn-nexus-main { background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.2); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-nexus-main:active { transform: scale(0.95); }
        .nexus-card { background: #ffffff; border: 1px solid rgba(241, 245, 249, 1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); transition: all 0.4s ease; }
        .nexus-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .loader-spinner { border-top-color: #3B82F6; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .mobile-bottom-bar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid rgba(226, 232, 240, 0.8); }
        .profile-banner { background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%); }
    </style>
</head>
<body>
    <div id="root">
        <div class="min-h-screen flex flex-col items-center justify-center bg-white text-center p-10">
            <div class="loader-spinner ease-linear rounded-full border-4 border-t-4 border-gray-100 h-12 w-12 mb-6"></div>
            <h1 class="text-xl font-extrabold text-slate-900 tracking-tighter uppercase">Initializing Nexus Protocol</h1>
            <p class="text-slate-400 mt-2 text-sm font-medium tracking-wide uppercase">Establishing Global Uplink...</p>
        </div>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            signOut, signInAnonymously, updateProfile, GoogleAuthProvider, signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc, getDoc, updateDoc, increment, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBNdUnvdffGt9bJgwZsJXcPulomN4M1Lbs",
            authDomain: "prompthub-e69f8.firebaseapp.com",
            projectId: "prompthub-e69f8",
            storageBucket: "prompthub-e69f8.firebasestorage.app",
            messagingSenderId: "876000777567",
            appId: "1:876000777567:web:1927dd9d1bd037678792ea"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'prompthub-e69f8'; 
        const googleProvider = new GoogleAuthProvider();

        window.fb = { 
            auth, db, appId, collection, addDoc, query, onSnapshot, 
            serverTimestamp, doc, setDoc, getDoc, updateDoc, increment, deleteDoc,
            signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            signOut, onAuthStateChanged, signInAnonymously, updateProfile, 
            googleProvider, signInWithPopup
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [user, setUser] = useState(null);
            const [profileData, setProfileData] = useState({ bio: '', name: '', photoURL: '', followersCount: 0, followingCount: 0 });
            const [view, setView] = useState('home'); 
            const [posts, setPosts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [authModal, setAuthModal] = useState({ open: false, mode: 'login', email: '', password: '', name: '', error: '' });
            const [postModal, setPostModal] = useState({ open: false, prompt: '', imageUrl: '', model: 'Midjourney v6.1 Pro' });
            const [editProfileModal, setEditProfileModal] = useState({ open: false, name: '', bio: '', photoURL: '' });
            const [copiedId, setCopiedId] = useState(null);
            
            // User states for discovery
            const [selectedUser, setSelectedUser] = useState(null);
            const [isFollowing, setIsFollowing] = useState(false);

            useEffect(() => {
                const handleReady = () => setIsReady(true);
                if (window.fb) handleReady();
                else window.addEventListener('firebase-ready', handleReady);
                return () => window.removeEventListener('firebase-ready', handleReady);
            }, []);

            useEffect(() => {
                if (!isReady) return;
                const { auth, onAuthStateChanged, signInAnonymously } = window.fb;
                const unsubscribeAuth = onAuthStateChanged(auth, async (u) => {
                    if (!u) {
                        try { await signInAnonymously(auth); } catch (e) { console.warn("Guest access active"); }
                    }
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribeAuth();
            }, [isReady]);

            // Fetch My Profile Data
            useEffect(() => {
                if (!isReady || !user || user.isAnonymous) return;
                const { db, appId, doc, onSnapshot } = window.fb;
                const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info');
                const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', user.uid);
                
                const unsubscribeProfile = onSnapshot(profileRef, (snap) => {
                    if (snap.exists()) setProfileData(prev => ({ ...prev, ...snap.data() }));
                });
                const unsubscribeStats = onSnapshot(statsRef, (snap) => {
                    if (snap.exists()) setProfileData(prev => ({ ...prev, ...snap.data() }));
                });
                return () => { unsubscribeProfile(); unsubscribeStats(); };
            }, [isReady, user]);

            // Fetch Global Feed
            useEffect(() => {
                if (!isReady || !user) return; 
                const { db, appId, collection, onSnapshot } = window.fb;
                const postsCol = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                const unsubscribePosts = onSnapshot(postsCol, (snap) => {
                    const fetched = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPosts(fetched.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => console.error("Feed Error:", err));
                return () => unsubscribePosts();
            }, [isReady, user]);

            // Track if following the selected user
            useEffect(() => {
                if (!selectedUser || !user || user.isAnonymous) return;
                const { db, appId, doc, onSnapshot } = window.fb;
                const followRef = doc(db, 'artifacts', appId, 'public', 'data', 'follows', `${user.uid}_${selectedUser.id}`);
                const unsubscribe = onSnapshot(followRef, (snap) => {
                    setIsFollowing(snap.exists());
                });
                return () => unsubscribe();
            }, [selectedUser, user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, user, posts, authModal.open, postModal.open, editProfileModal.open, selectedUser, isFollowing]);

            const handleGoogleSignIn = async () => {
                setLoading(true);
                const { auth, db, appId, googleProvider, signInWithPopup, doc, setDoc, getDoc, serverTimestamp } = window.fb;
                try {
                    const result = await signInWithPopup(auth, googleProvider);
                    const loggedInUser = result.user;
                    const profileRef = doc(db, 'artifacts', appId, 'users', loggedInUser.uid, 'profile', 'info');
                    const profileSnap = await getDoc(profileRef);
                    if (!profileSnap.exists()) {
                        await setDoc(profileRef, {
                            name: loggedInUser.displayName,
                            email: loggedInUser.email,
                            photoURL: loggedInUser.photoURL,
                            bio: 'Elite AI Creator exploring the Nexus.',
                            followersCount: 0,
                            followingCount: 0,
                            createdAt: serverTimestamp()
                        });
                    }
                    setAuthModal({ ...authModal, open: false, error: '' });
                } catch (err) {
                    setAuthModal(prev => ({ ...prev, error: "Authentication failed." }));
                }
                setLoading(false);
            };

            const toggleFollow = async () => {
                if (!user || user.isAnonymous) return setAuthModal({...authModal, open: true, mode: 'login'});
                if (!selectedUser) return;

                const { db, appId, doc, setDoc, deleteDoc, increment, serverTimestamp } = window.fb;
                const followId = `${user.uid}_${selectedUser.id}`;
                const followRef = doc(db, 'artifacts', appId, 'public', 'data', 'follows', followId);
                
                // Public stats වලට ලියන නිසා දැන් කිසිම error එකක් එන්නේ නෑ 🚀
                const myStatsRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', user.uid);
                const targetStatsRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', selectedUser.id);

                try {
                    if (isFollowing) {
                        await deleteDoc(followRef);
                        await setDoc(myStatsRef, { followingCount: increment(-1) }, { merge: true });
                        await setDoc(targetStatsRef, { followersCount: increment(-1) }, { merge: true });
                        setSelectedUser(prev => ({ ...prev, followersCount: Math.max(0, (prev.followersCount || 0) - 1) }));
                    } else {
                        await setDoc(followRef, { followerId: user.uid, followingId: selectedUser.id, timestamp: serverTimestamp() }, { merge: true });
                        await setDoc(myStatsRef, { followingCount: increment(1) }, { merge: true });
                        await setDoc(targetStatsRef, { followersCount: increment(1) }, { merge: true });
                        setSelectedUser(prev => ({ ...prev, followersCount: (prev.followersCount || 0) + 1 }));
                    }
                } catch (e) { 
                    console.error("Follow error:", e); 
                }
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { auth, db, appId, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, setDoc, doc, serverTimestamp } = window.fb;
                try {
                    if (authModal.mode === 'signup') {
                        const res = await createUserWithEmailAndPassword(auth, authModal.email, authModal.password);
                        await updateProfile(res.user, { displayName: authModal.name });
                        await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'info'), {
                            name: authModal.name, 
                            email: authModal.email, 
                            photoURL: `https://api.dicebear.com/7.x/avataaars/svg?seed=${res.user.uid}`,
                            bio: 'Newly authorized intelligence in the Nexus.',
                            followersCount: 0,
                            followingCount: 0,
                            createdAt: serverTimestamp()
                        });
                    } else {
                        await signInWithEmailAndPassword(auth, authModal.email, authModal.password);
                    }
                    setAuthModal({ ...authModal, open: false, error: '' });
                } catch (err) {
                    setAuthModal({ ...authModal, error: "Access denied." });
                }
                setLoading(false);
            };

            const openPublicProfile = async (targetUserId) => {
                if (targetUserId === user?.uid) {
                    setView('profile');
                    setSelectedUser(null);
                    return;
                }
                const { db, appId, doc, getDoc } = window.fb;
                try {
                    const profileRef = doc(db, 'artifacts', appId, 'users', targetUserId, 'profile', 'info');
                    const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', targetUserId);
                    
                    const profileSnap = await getDoc(profileRef);
                    const statsSnap = await getDoc(statsRef);
                    
                    if (profileSnap.exists()) {
                        const statsData = statsSnap.exists() ? statsSnap.data() : { followersCount: 0, followingCount: 0 };
                        setSelectedUser({ id: targetUserId, ...profileSnap.data(), ...statsData });
                        setView('public_profile');
                    }
                } catch (e) { console.error("Profile load error:", e); }
            };

            const saveProfileUpdates = async (e) => {
                e.preventDefault();
                const { db, appId, doc, updateDoc, auth, updateProfile } = window.fb;
                try {
                    const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info');
                    await updateDoc(profileRef, { name: editProfileModal.name, bio: editProfileModal.bio, photoURL: editProfileModal.photoURL });
                    await updateProfile(auth.currentUser, { displayName: editProfileModal.name, photoURL: editProfileModal.photoURL });
                    setEditProfileModal({ ...editProfileModal, open: false });
                } catch (e) { console.error(e); }
            };

            const handleCreatePost = async (e) => {
                e.preventDefault();
                if (!user || user.isAnonymous) return setAuthModal({ ...authModal, open: true, mode: 'login' });
                setLoading(true);
                const { db, appId, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), {
                        userId: user.uid,
                        userName: profileData.name || user.displayName,
                        userPhoto: profileData.photoURL || user.photoURL,
                        prompt: postModal.prompt,
                        imageUrl: postModal.imageUrl,
                        model: postModal.model,
                        createdAt: serverTimestamp(),
                        likes: 0
                    });
                    setPostModal({ open: false, prompt: '', imageUrl: '', model: 'Midjourney v6.1 Pro' });
                    setView('home');
                } catch (err) { console.error(err); }
                setLoading(false);
            };

            const userPosts = posts.filter(p => p.userId === user?.uid);
            const targetUserPosts = selectedUser ? posts.filter(p => p.userId === selectedUser.id) : [];

            if (loading && !isReady) return null;

            return (
                <div className="min-h-screen pb-24 md:pb-0">
                    <nav className="sticky top-0 z-50 nexus-nav px-6 py-4">
                        <div className="max-w-5xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => { setView('home'); setSelectedUser(null); }}>
                                <div className="w-10 h-10 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-lg active:scale-90 transition-transform">
                                    <i data-lucide="zap" className="w-6" fill="currentColor"></i>
                                </div>
                                <h1 className="text-2xl font-black tracking-tighter text-slate-900 uppercase">PROMPTHUB<span className="text-blue-600 ml-1">NEXUS</span></h1>
                            </div>
                            <div className="flex items-center gap-4">
                                {!user || user.isAnonymous ? (
                                    <button onClick={() => setAuthModal({ ...authModal, open: true, mode: 'login', error: '' })} className="bg-blue-600 text-white px-7 py-3 rounded-2xl font-bold text-xs shadow-lg active:scale-95 transition-all uppercase tracking-widest">SIGN IN</button>
                                ) : (
                                    <button onClick={() => { setView('profile'); setSelectedUser(null); }} className="w-12 h-12 rounded-2xl overflow-hidden border-2 border-blue-500 shadow-sm active:scale-90 transition-transform bg-white p-0.5">
                                        <img src={profileData.photoURL || user.photoURL} className="rounded-xl object-cover w-full h-full" />
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-xl mx-auto px-4 py-10">
                        {view === 'home' ? (
                            <div className="space-y-12 animate-in fade-in duration-700">
                                <div className="text-center px-4 mb-14">
                                    <h2 className="text-5xl font-black text-slate-900 tracking-tighter leading-none mb-4 uppercase italic">Nexus Global</h2>
                                    <p className="text-slate-400 font-medium text-[11px] tracking-[0.3em] opacity-80 uppercase leading-relaxed text-center">World-Class AI Intel Community</p>
                                </div>
                                {posts.length === 0 ? (
                                    <div className="text-center py-32 bg-white rounded-[4rem] border border-dashed border-slate-200">
                                        <i data-lucide="globe" className="text-slate-200 w-16 h-16 mx-auto mb-6 animate-pulse"></i>
                                        <p className="text-slate-400 font-black text-[10px] uppercase tracking-[0.4em]">Syncing Global Data Stream...</p>
                                    </div>
                                ) : (
                                    posts.map(post => (
                                        <div key={post.id} className="bg-white rounded-[3.5rem] border border-slate-100 overflow-hidden nexus-card transition-all mb-14 p-2">
                                            <div className="p-6 flex items-center justify-between">
                                                <div className="flex items-center gap-4 cursor-pointer group" onClick={() => openPublicProfile(post.userId)}>
                                                    <div className="p-0.5 rounded-2xl bg-gradient-to-tr from-blue-500 to-indigo-600 shadow-sm group-hover:scale-105 transition-transform">
                                                        <img src={post.userPhoto} className="w-11 h-11 rounded-2xl bg-white p-0.5" />
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <span className="font-extrabold text-[16px] text-slate-800 tracking-tight leading-none group-hover:text-blue-600 transition-colors">{post.userName}</span>
                                                        <span className="text-[10px] font-black uppercase text-blue-500 tracking-widest flex items-center gap-1 opacity-80 mt-1.5"><i data-lucide="cpu" className="w-3"></i> {post.model}</span>
                                                    </div>
                                                </div>
                                                <button onClick={() => toggleLike(post.id)} className="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-xl text-slate-400 hover:text-red-500 transition-colors font-bold text-xs group">
                                                    <i data-lucide="heart" className="w-4 h-4 group-hover:fill-current"></i> {post.likes || 0}
                                                </button>
                                            </div>
                                            <div className="relative group px-4">
                                                <img src={post.imageUrl} className="w-full aspect-square object-cover rounded-[3rem] shadow-sm bg-slate-50" loading="lazy" />
                                                <button onClick={() => { 
                                                    const ta = document.createElement("textarea"); ta.value = post.prompt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
                                                    setCopiedId(post.id); setTimeout(() => setCopiedId(null), 2000);
                                                }} className="absolute bottom-10 right-10 bg-white/90 backdrop-blur text-slate-900 p-5 rounded-3xl shadow-2xl hover:scale-110 active:scale-90 transition-all border border-white">
                                                    {copiedId === post.id ? <i data-lucide="check-check" className="text-green-600 w-7 h-7"></i> : <i data-lucide="clipboard-list" className="w-7 h-7"></i>}
                                                </button>
                                            </div>
                                            <div className="p-8"><div className="bg-slate-50/70 p-7 rounded-[2.8rem] border border-slate-100 italic relative"><p className="text-[15px] font-mono text-slate-600 leading-relaxed">"{post.prompt}"</p></div></div>
                                        </div>
                                    ))
                                )}
                            </div>
                        ) : view === 'profile' ? (
                            <div className="animate-in fade-in slide-in-from-bottom-10 duration-700">
                                <div className="bg-white rounded-[4rem] text-center border border-slate-100 shadow-sm relative overflow-hidden mb-10">
                                    <div className="h-44 profile-banner relative"><div className="absolute inset-0 bg-black/10"></div></div>
                                    <div className="px-12 pb-14 relative flex flex-col items-center">
                                        <div className="flex flex-col items-center -mt-20">
                                            <img src={profileData.photoURL || user?.photoURL} className="w-44 h-44 rounded-[3.5rem] border-8 border-white shadow-2xl bg-white object-cover mb-6" />
                                            <h2 className="text-4xl font-black text-slate-900 mb-2 tracking-tighter uppercase leading-none">{profileData.name || user?.displayName}</h2>
                                            <p className="text-blue-600 font-black text-[11px] mb-6 tracking-[0.4em] uppercase">{user?.email}</p>
                                            
                                            {/* Facebook Style Stats */}
                                            <div className="flex gap-8 mb-8">
                                                <div className="text-center"><p className="text-2xl font-black text-slate-900 leading-none">{profileData.followersCount || 0}</p><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Followers</p></div>
                                                <div className="text-center border-l border-slate-100 pl-8"><p className="text-2xl font-black text-slate-900 leading-none">{profileData.followingCount || 0}</p><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Following</p></div>
                                            </div>

                                            <div className="bg-slate-50/50 p-6 rounded-[2.5rem] border border-slate-50 max-w-md mb-10"><p className="text-slate-500 font-medium text-sm leading-relaxed italic">"{profileData.bio}"</p></div>
                                            <div className="flex gap-4 w-full justify-center">
                                                <button onClick={() => setEditProfileModal({ open: true, name: profileData.name, bio: profileData.bio, photoURL: profileData.photoURL })} className="bg-slate-900 text-white px-12 py-4.5 rounded-[2rem] font-black text-xs tracking-[0.2em] hover:shadow-2xl active:scale-95 uppercase flex items-center gap-2"><i data-lucide="edit-3" className="w-4 h-4"></i> Edit Profile</button>
                                                <button onClick={() => window.fb.signOut(window.fb.auth).then(() => setView('home'))} className="text-[11px] font-black text-red-500 uppercase tracking-[0.3em] border-2 border-red-50 px-8 py-4.5 rounded-[2rem] hover:bg-red-50 transition-colors">Sign Out</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <h3 className="text-xl font-black text-slate-900 uppercase tracking-widest px-4">Portfolio</h3>
                                    <div className="grid grid-cols-2 gap-4 px-2">
                                        {userPosts.map(p => (
                                            <div key={p.id} className="aspect-square bg-slate-100 rounded-[2rem] overflow-hidden shadow-sm group relative">
                                                <img src={p.imageUrl} className="w-full h-full object-cover transition-transform group-hover:scale-110" />
                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center p-4"><p className="text-white text-[9px] font-mono text-center">"{p.prompt}"</p></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            // Public Profile View
                            <div className="animate-in fade-in slide-in-from-bottom-10 duration-700">
                                <div className="bg-white rounded-[4rem] text-center border border-slate-100 shadow-sm relative overflow-hidden mb-10">
                                    <div className="h-44 profile-banner relative"></div>
                                    <div className="px-12 pb-14 relative flex flex-col items-center">
                                        <div className="flex flex-col items-center -mt-20">
                                            <img src={selectedUser.photoURL} className="w-44 h-44 rounded-[3.5rem] border-8 border-white shadow-2xl bg-white object-cover mb-6" />
                                            <h2 className="text-4xl font-black text-slate-900 mb-2 tracking-tighter uppercase leading-none">{selectedUser.name}</h2>
                                            
                                            {/* Stats View */}
                                            <div className="flex gap-8 mb-8 mt-2">
                                                <div className="text-center"><p className="text-2xl font-black text-slate-900 leading-none">{selectedUser.followersCount || 0}</p><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Followers</p></div>
                                                <div className="text-center border-l border-slate-100 pl-8"><p className="text-2xl font-black text-slate-900 leading-none">{selectedUser.followingCount || 0}</p><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Following</p></div>
                                            </div>

                                            <div className="bg-slate-50/50 p-6 rounded-[2.5rem] border border-slate-50 max-w-md mb-10"><p className="text-slate-500 font-medium text-sm leading-relaxed italic">"{selectedUser.bio}"</p></div>
                                            
                                            {/* Action Button: Follow/Unfollow */}
                                            <button 
                                                onClick={toggleFollow}
                                                className={`w-full max-w-[240px] py-5 rounded-[2rem] font-black text-xs tracking-[0.2em] shadow-xl active:scale-95 uppercase flex items-center justify-center gap-2 transition-all ${isFollowing ? 'bg-slate-100 text-slate-500 hover:bg-red-50 hover:text-red-500' : 'bg-blue-600 text-white hover:bg-blue-700'}`}
                                            >
                                                {isFollowing ? <><i data-lucide="user-check" className="w-4 h-4"></i> Following</> : <><i data-lucide="user-plus" className="w-4 h-4"></i> Follow Creator</>}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <h3 className="text-xl font-black text-slate-900 uppercase tracking-widest px-4">Shared Intel</h3>
                                    <div className="grid grid-cols-2 gap-4 px-2">
                                        {targetUserPosts.map(p => (
                                            <div key={p.id} className="aspect-square bg-slate-100 rounded-[2rem] overflow-hidden shadow-sm group relative">
                                                <img src={p.imageUrl} className="w-full h-full object-cover transition-transform group-hover:scale-110" />
                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center p-4"><p className="text-white text-[9px] font-mono text-center">"{p.prompt}"</p></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={() => { setView('home'); setSelectedUser(null); }} className="w-full py-7 bg-slate-900 text-white rounded-[3rem] font-bold hover:shadow-2xl transition-all shadow-slate-200 uppercase tracking-[0.2em] text-xs mt-10">Back to Global Feed</button>
                            </div>
                        )}
                    </main>

                    {/* Desktop Float Button */}
                    <button onClick={() => { if(!user || user.isAnonymous) setAuthModal({...authModal, open: true, mode: 'login'}); else setPostModal({ ...postModal, open: true }); }} className="fixed bottom-10 right-10 bg-slate-900 text-white hidden md:flex items-center gap-3 px-10 py-5 rounded-[2rem] shadow-2xl z-40 hover:scale-105 active:scale-95 transition-all group border-4 border-white/10"><i data-lucide="plus" className="w-6 h-6 group-hover:rotate-90 transition-transform"></i><span className="font-black text-[10px] uppercase tracking-widest">Transmit Insight</span></button>

                    <div className="fixed bottom-0 w-full mobile-bottom-bar px-14 py-7 flex justify-around items-center md:hidden z-40">
                         <i data-lucide="home" className={`w-8 cursor-pointer transition-all ${view==='home'?'text-blue-600 scale-110':'text-slate-300'}`} onClick={()=>{ setView('home'); setSelectedUser(null); }}></i>
                         <div onClick={() => { if(!user || user.isAnonymous) setAuthModal({...authModal, open: true, mode: 'login', error: ''}); else setPostModal({ ...postModal, open: true }); }} className="w-16 h-16 btn-nexus-main rounded-[2.2rem] flex items-center justify-center text-white -mt-24 shadow-2xl active:scale-90 transition-transform cursor-pointer border-4 border-white"><i data-lucide="plus" className="w-9 h-9"></i></div>
                         <i data-lucide="user" className={`w-8 cursor-pointer transition-all ${(view==='profile' || view==='public_profile')?'text-blue-600 scale-110':'text-slate-300'}`} onClick={()=>{ setView('profile'); setSelectedUser(null); }}></i>
                    </div>

                    {authModal.open && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-slate-900/70 backdrop-blur-xl">
                            <div className="bg-white w-full max-w-md rounded-[3.5rem] p-14 shadow-2xl animate-in slide-in-from-bottom-10 sm:zoom-in-95 duration-300 border border-white/20 text-center">
                                <h2 className="text-4xl font-black mb-2 text-slate-900 tracking-tighter leading-none uppercase">{authModal.mode === 'login' ? 'IDENTITY PORTAL' : 'NEXUS ORIGIN'}</h2>
                                <p className="text-slate-400 font-black text-[10px] mt-4 uppercase tracking-[0.4em] opacity-60 italic mb-10">Secure Intelligence Access</p>
                                {authModal.error && <div className="bg-red-50 text-red-600 text-[10px] font-black p-5 rounded-2xl mb-8 border border-red-100 uppercase tracking-widest">{authModal.error}</div>}
                                <button onClick={handleGoogleSignIn} className="w-full flex items-center justify-center gap-4 bg-white border-2 border-slate-50 py-5 rounded-[2.2rem] font-black text-sm text-slate-700 hover:bg-slate-50 transition-all mb-10 shadow-sm active:scale-95"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" className="w-6 h-6" /> CONTINUE WITH GOOGLE</button>
                                <div className="flex items-center gap-4 mb-10"><div className="h-px bg-slate-100 flex-1"></div><span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">secure link</span><div className="h-px bg-slate-100 flex-1"></div></div>
                                <form onSubmit={handleAuth} className="space-y-5">
                                    {authModal.mode === 'signup' && <input type="text" placeholder="DISPLAY NAME" className="w-full bg-slate-50 border border-slate-100 rounded-[2rem] py-5 px-8 outline-none focus:ring-4 focus:ring-blue-500/10 font-bold text-sm tracking-widest transition-all" required value={authModal.name} onChange={e => setAuthModal({...authModal, name: e.target.value})} />}
                                    <input type="email" placeholder="EMAIL ADDRESS" className="w-full bg-slate-50 border border-slate-100 rounded-[2rem] py-5 px-8 outline-none focus:ring-4 focus:ring-blue-500/10 font-bold text-sm tracking-widest transition-all" required value={authModal.email} onChange={e => setAuthModal({...authModal, email: e.target.value})} />
                                    <input type="password" placeholder="SECURITY KEY" className="w-full bg-slate-50 border border-slate-100 rounded-[2rem] py-5 px-8 outline-none focus:ring-4 focus:ring-blue-500/10 font-bold text-sm tracking-widest transition-all" required value={authModal.password} onChange={e => setAuthModal({...authModal, password: e.target.value})} />
                                    <button className="w-full btn-nexus-main text-white py-6 rounded-[2.2rem] font-black text-sm tracking-[0.3em] shadow-xl active:scale-95 transition-all uppercase">Establish Link</button>
                                </form>
                                <button onClick={() => setAuthModal({...authModal, mode: authModal.mode==='login'?'signup':'login', error: ''})} className="w-full mt-10 text-[11px] font-black text-slate-400 hover:text-blue-600 transition-colors uppercase tracking-[0.3em]">{authModal.mode === 'login' ? "Request Access" : "Existing Member? Sign In"}</button>
                                <button onClick={() => setAuthModal({...authModal, open: false})} className="w-full mt-6 text-[10px] font-black text-slate-200 uppercase tracking-widest hover:text-slate-400 transition-colors">Discard Tunnel</button>
                            </div>
                        </div>
                    )}

                    {/* Edit Profile Modal */}
                    {editProfileModal.open && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-slate-900/70 backdrop-blur-xl">
                            <div className="bg-white w-full max-w-md rounded-[3.5rem] p-12 shadow-2xl animate-in slide-in-from-bottom-10 duration-300">
                                <h2 className="text-3xl font-black mb-8 text-slate-900 text-center tracking-tighter uppercase leading-none">Sync Profile Intel</h2>
                                <form onSubmit={saveProfileUpdates} className="space-y-6">
                                    <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Display Name</label><input type="text" className="w-full bg-slate-50 border border-slate-100 rounded-[1.8rem] py-4.5 px-8 outline-none focus:ring-4 focus:ring-blue-500/10 font-bold text-sm tracking-wide transition-all" value={editProfileModal.name} onChange={e => setEditProfileModal({...editProfileModal, name: e.target.value})} /></div>
                                    <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Creator Bio</label><textarea className="w-full bg-slate-50 border border-slate-100 rounded-[1.8rem] py-4.5 px-8 outline-none focus:ring-4 focus:ring-blue-500/10 font-medium text-sm transition-all min-h-[100px]" value={editProfileModal.bio} onChange={e => setEditProfileModal({...editProfileModal, bio: e.target.value})}></textarea></div>
                                    <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Avatar URL</label><input type="text" className="w-full bg-slate-50 border border-slate-100 rounded-[1.8rem] py-4.5 px-8 outline-none focus:ring-4 focus:ring-blue-500/10 font-medium text-xs transition-all" value={editProfileModal.photoURL} onChange={e => setEditProfileModal({...editProfileModal, photoURL: e.target.value})} /></div>
                                    <button className="w-full btn-nexus-main text-white py-6 rounded-[2.2rem] font-black text-sm tracking-[0.3em] shadow-xl active:scale-95 transition-all uppercase">Save Intel</button>
                                    <button type="button" onClick={() => setEditProfileModal({ ...editProfileModal, open: false })} className="w-full mt-2 text-[10px] font-black text-slate-300 uppercase tracking-widest text-center hover:text-slate-400">Cancel Sync</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {postModal.open && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-slate-900/50 backdrop-blur-2xl">
                            <div className="bg-white w-full max-w-lg rounded-[4.5rem] p-14 shadow-2xl animate-in slide-in-from-bottom-8 duration-500 overflow-y-auto max-h-[90vh]">
                                <h2 className="text-3xl font-black mb-12 text-slate-900 text-center tracking-tighter uppercase leading-none">Share Intelligence</h2>
                                <form onSubmit={handleCreatePost} className="space-y-10">
                                    <div className="space-y-3"><label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em] ml-3">Visual Output URL</label><input type="text" placeholder="https://..." className="w-full bg-slate-50 border border-slate-100 rounded-[2.2rem] py-6 px-10 outline-none font-bold focus:ring-4 focus:ring-blue-500/10 shadow-sm text-sm tracking-wide" value={postModal.imageUrl} onChange={e => setPostModal({...postModal, imageUrl: e.target.value})} /></div>
                                    <div className="space-y-3"><label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em] ml-3">Creative Formula</label><textarea placeholder="Specify the secret magic behind this..." className="w-full bg-slate-50 border border-slate-100 rounded-[2.8rem] p-10 min-h-[220px] font-mono text-[15px] leading-relaxed outline-none focus:ring-4 focus:ring-blue-500/10 shadow-sm" required value={postModal.prompt} onChange={e => setPostModal({...postModal, prompt: e.target.value})}></textarea></div>
                                    <div className="space-y-3"><label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em] ml-3">Intelligence Model</label><select className="w-full bg-slate-50 border border-slate-100 rounded-[2.2rem] py-6 px-10 font-black text-xs outline-none cursor-pointer focus:ring-4 focus:ring-blue-500/10" value={postModal.model} onChange={e => setPostModal({...postModal, model: e.target.value})}><option>Midjourney v6.1 Pro</option><option>DALL-E 3 Nexus</option><option>Stable Diffusion XL Turbo</option><option>Flux.1 Dev Master</option><option>Google Veo 3 Elite</option></select></div>
                                    <button className="w-full btn-nexus-main text-white py-7 rounded-[3rem] font-black text-sm tracking-[0.3em] shadow-xl active:scale-95 transition-all">TRANSMIT TO NEXUS</button>
                                    <button type="button" onClick={() => setPostModal({ ...postModal, open: false })} className="w-full text-xs font-black text-slate-300 uppercase tracking-widest text-center mt-4">Discard</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
