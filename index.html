                        const getScore = (p) => {
                            const cInfo = allCreators.find(c => c.id === p.userId);
                            const age = ((Date.now() / 1000) - (p.createdAt?.seconds || Date.now() / 1000)) / 3600;
                            
                            // Boost Check (පැය 24කට ලොකු Boost එකක් දෙනවා)
                            const isBoosted = p.boostedAt && ((Date.now() / 1000) - p.boostedAt.seconds < 86400);

                            const verifiedScore = cInfo?.isVerified ? (adminConfig.verifiedBonus || 20) : 0;
                            
                            return ((typeof p.likes === 'number' ? p.likes : (p.likes?.length || 0)) * adminConfig.likesWeight)

                if (interval > 1) return Math.floor(interval) + 'y ago';
                interval = seconds / 2592000;

                interval = seconds / 86400;

                                        className="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700 rounded-2xl py-4 px-5 outline-none font-mono text-sm min-h-[150px] focus:ring-2 focus:ring-blue-500/20 text-slate-800 dark:text-slate-200"
                                        value={editPostModal.newPrompt}
                                        onChange={e => setEditPostModal({...editPostModal, newPrompt: e.target.value})}
                                        placeholder="Update your prompt..."
                                        required
                                    ></textarea>
                                    <button disabled={uploading || editPostModal.newPrompt === editPostModal.post.prompt} type="submit" className="w-full bg-blue-600 text-white py-4 rounded-full font-black text-sm hover:bg-blue-700 disabled:opacity-50 transition-all shadow-lg">
                                        {uploading ? 'UPDATING...' : 'SAVE CHANGES'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                    {/* 🚀 Repost (Internal Share) Modal */}
                    {repostModal.open && repostModal.post && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-xl">
                            <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2.5rem] p-6 md:p-8 shadow-2xl animate-in zoom-in-95 duration-300 border border-slate-100 dark:border-slate-700 text-center">
                                <div className="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-100 dark:border-blue-900/50">
                                    <Icon name="repeat" className="w-8 h-8" />
                                </div>
                                <h2 className="text-xl font-black text-slate-900 dark:text-white uppercase mb-2">Share Post</h2>
                                <p className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-6 px-4">Share this prompt with your followers on Nexia?</p>
                                
                                <div className="flex gap-3 pt-2">
                                    <button onClick={() => setRepostModal({ open: false, post: null })} className="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-3 rounded-xl font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancel</button>
                                    <button disabled={uploading} onClick={confirmRepost} className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700 disabled:opacity-50 transition-all shadow-lg">{uploading ? 'Sharing...' : 'Yes, Share'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* 🚀 External Share Modal (Updated with Socials & Bug Fix) */}
                    {shareModal.open && shareModal.post && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-xl">
                            <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2.5rem] p-6 md:p-8 shadow-2xl animate-in zoom-in-95 duration-300 border border-slate-100 dark:border-slate-700 text-center relative">
                                
                                {/* Close Button (Top Right) */}
                                <button onClick={() => setShareModal({ open: false, post: null })} className="absolute top-5 right-5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-2 bg-slate-50 dark:bg-slate-700 rounded-full transition-colors">
                                    <Icon name="x" className="w-4 h-4" />
                                </button>

                                <div className="w-16 h-16 bg-green-50 dark:bg-green-900/30 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-100 dark:border-green-900/50">
                                    <Icon name="share" className="w-8 h-8" />
                                </div>
                                <h2 className="text-xl font-black text-slate-900 dark:text-white uppercase mb-2">Share With The World</h2>
                                <p className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-6 px-4">Show off this amazing AI prompt to your friends!</p>
                                
                                {/* 🚀 Social Media Sharing Buttons */}
                                <div className="flex justify-center gap-4 mb-6">
                                    {/* WhatsApp */}
                                    <a href={`https://api.whatsapp.com/send?text=${encodeURIComponent("Check out this awesome AI prompt on Nexia PromptHub! https://nexus.vercel.app")}`} target="_blank" rel="noopener noreferrer" className="w-12 h-12 bg-[#25D366] text-white rounded-full flex items-center justify-center hover:scale-110 shadow-lg transition-transform" title="Share on WhatsApp">
                                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                                    </a>
                                    
                                    {/* Facebook */}
                                    <a href={`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent("https://nexus.vercel.app")}`} target="_blank" rel="noopener noreferrer" className="w-12 h-12 bg-[#1877F2] text-white rounded-full flex items-center justify-center hover:scale-110 shadow-lg transition-transform" title="Share on Facebook">
                                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                    </a>

                                    {/* Twitter / X */}
                                    <a href={`https://twitter.com/intent/tweet?text=${encodeURIComponent("Check out this awesome AI prompt on Nexia PromptHub!")}&url=${encodeURIComponent("https://nexus.vercel.app")}`} target="_blank" rel="noopener noreferrer" className="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center hover:scale-110 shadow-lg transition-transform" title="Share on X">
                                        <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                    </a>
                                </div>
                                
                                {/* 🚀 Non-blocking Copy Link Section */}
                                <div className="bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl p-2 flex items-center justify-between mb-4">
                                    <span className="text-xs font-mono text-slate-500 truncate w-48 text-left pl-2">https://nexus.vercel.app</span>
                                    <button onClick={(e) => { 
                                        navigator.clipboard.writeText("https://nexus.vercel.app"); 
                                        const btn = e.target; 
                                        const originalText = btn.innerText; 
                                        btn.innerText = "COPIED!"; 
                                        btn.classList.add("bg-green-500", "scale-105");
                                        setTimeout(() => { 
                                            btn.innerText = originalText; 
                                            btn.classList.remove("bg-green-500", "scale-105"); 
                                        }, 2000); 
                                    }} className="bg-blue-600 text-white px-4 py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 transition-all shadow-sm min-w-[80px]">Copy</button>
                                </div>

                                <button onClick={() => setShareModal({ open: false, post: null })} className="w-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-3 rounded-xl font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Done</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
</body>
</html>
