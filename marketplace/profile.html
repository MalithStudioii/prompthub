<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Promptplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-20">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-extrabold text-blue-600 tracking-tight cursor-pointer">Prompt<span class="text-gray-800">place</span> 🚀</a>
            <div class="flex items-center gap-4">
                <a href="../index.html" class="text-sm font-bold text-gray-500 hover:text-blue-600">Back to Newsfeed</a>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto mt-8 px-4">
        
        <div class="bg-white rounded-3xl shadow-md overflow-hidden mb-8 border border-gray-100">
            <div id="profile-cover" class="h-48 bg-gradient-to-r from-blue-500 to-purple-600 w-full bg-cover bg-center relative transition-all duration-500">
            </div>
            
            <div class="px-8 pb-8 relative">
                <div class="relative flex justify-between items-end -mt-16 mb-4">
                    <div class="relative">
                        <img id="profile-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=guest" alt="User Avatar" class="w-32 h-32 rounded-[2rem] border-4 border-white shadow-lg object-cover bg-white transition-all duration-500">
                        <span class="absolute bottom-2 right-2 w-5 h-5 bg-green-500 border-2 border-white rounded-full" title="Online"></span>
                    </div>
                </div>
                
                <div>
                    <h2 id="profile-name" class="text-3xl font-extrabold text-gray-900">Loading Creator...</h2>
                    <p class="text-gray-500 font-medium mb-4">@NexiaCreator • Verified Account</p>
                    
                    <p id="profile-bio" class="text-gray-700 max-w-2xl leading-relaxed font-medium">
                        Loading your intelligence stream...
                    </p>
                </div>
            </div>
        </div>

        <h3 class="text-xl font-extrabold text-gray-800 mb-6 border-b-2 border-gray-200 pb-2">Creator Dashboard</h3>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <a href="index.html" class="group relative bg-gradient-to-br from-blue-50 to-white border border-blue-100 rounded-2xl p-6 shadow-sm hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 flex items-center gap-5 overflow-hidden">
                <div class="absolute right-0 top-0 opacity-5 group-hover:opacity-10 transition-opacity transform scale-150 translate-x-4 -translate-y-4">
                    <svg class="w-24 h-24 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <div class="relative z-10 flex-shrink-0 bg-blue-600 text-white p-4 rounded-xl shadow-md group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <div class="relative z-10">
                    <h4 class="text-xl font-extrabold text-gray-900 group-hover:text-blue-700 transition-colors">Promptplace Market</h4>
                    <p class="text-sm text-gray-500 mt-1 font-medium leading-tight">Explore, unlock & buy premium AI assets.</p>
                </div>
            </a>

            <a href="upload-prompt.html" class="group relative bg-gradient-to-br from-purple-50 to-white border border-purple-100 rounded-2xl p-6 shadow-sm hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 flex items-center gap-5 overflow-hidden">
                <div class="absolute right-0 top-0 opacity-5 group-hover:opacity-10 transition-opacity transform scale-150 translate-x-4 -translate-y-4">
                    <svg class="w-24 h-24 text-purple-600" fill="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                </div>
                <div class="relative z-10 flex-shrink-0 bg-purple-600 text-white p-4 rounded-xl shadow-md group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                </div>
                <div class="relative z-10">
                    <h4 class="text-xl font-extrabold text-gray-900 group-hover:text-purple-700 transition-colors">Sell Digital Assets</h4>
                    <p class="text-sm text-gray-500 mt-1 font-medium leading-tight">Upload your creations and monetize your skills.</p>
                </div>
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // ඔයාගේ Main App එකේ Firebase Config එක
        const firebaseConfig = {
            apiKey: "AIzaSyBNdUnvdffGt9bJgwZsJXcPulomN4M1Lbs",
            authDomain: "prompthub-e69f8.firebaseapp.com",
            projectId: "prompthub-e69f8",
            storageBucket: "prompthub-e69f8.firebasestorage.app",
            messagingSenderId: "876000777567",
            appId: "1:876000777567:web:1927dd9d1bd037678792ea"
        };

        // Firebase Start කිරීම
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const nexusAppId = 'prompthub-e69f8'; 

        // යූසර් ලොග් වෙලාද කියලා බලනවා
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                console.log("Logged in user:", user.uid);
                
                try {
                    // Main React App එකෙන් ඩේටා සේව් කරපු තැනින්ම ඩේටා අදිනවා
                    const profileRef = db.collection('artifacts').doc(nexusAppId).collection('users').doc(user.uid).collection('profile').doc('info');
                    const docSnap = await profileRef.get();

                    if (docSnap.exists) {
                        const data = docSnap.data();
                        console.log("Profile Data Found:", data);
                        
                        // ID හරහා HTML වලට දත්ත යැවීම
                        if(data.name) document.getElementById('profile-name').innerText = data.name;
                        if(data.bio) document.getElementById('profile-bio').innerText = data.bio;
                        if(data.photoURL) document.getElementById('profile-avatar').src = data.photoURL;
                        
                        // Cover එක Background image එකක් විදිහට දානවා
                        if(data.coverURL) {
                            document.getElementById('profile-cover').style.backgroundImage = `url('${data.coverURL}')`;
                        }
                    } else {
                        console.log("Profile document doesn't exist yet!");
                        document.getElementById('profile-name').innerText = user.displayName || "Nexia Creator";
                    }
                } catch (error) {
                    console.error("Error fetching profile:", error);
                    document.getElementById('profile-bio').innerText = "Could not load profile data.";
                }

            } else {
                // ලොග් වෙලා නැත්නම් ආපහු Main Newsfeed එකට එළවනවා
                alert("Please log in from the main Nexia Feed first!");
                window.location.href = '../index.html';
            }
        });
    </script>
</body>
</html>
